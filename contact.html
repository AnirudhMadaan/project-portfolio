    <link rel="stylesheet" href="assets/css/style.css">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

</head>

<body>
    <div class="stars"></div>
    <header>
        <div class="logo"><img src="assets/images/logo.png" alt="top name logo" height="350"></div>
        <nav class="navbar">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="resume.html">Resume</a></li>
                <li><a href="skills.html">Skills</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="contact.html" class="nav-active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="contact-section page-section">
            <div class="container">
                <h2>Contact Me</h2>
                <div class="contact-wrapper">

                    <!-- Info cards -->
                    <div class="contact-info">
                        <div class="contact-info-card">
                            <div class="contact-icon">✉</div>
                            <div>
                                <p class="contact-info-label">Email</p>
                                <a href="mailto:anirudhmadaan.7398@gmail.com">anirudhmadaan.7398@gmail.com</a>
                            </div>
                        </div>
                        <div class="contact-info-card">
                            <div class="contact-icon">📞</div>
                            <div>
                                <p class="contact-info-label">Phone</p>
                                <a href="tel:+919530200100">+91 9530200100</a>
                            </div>
                        </div>
                        <div class="contact-info-card">
                            <div class="contact-icon">📍</div>
                            <div>
                                <p class="contact-info-label">Location</p>
                                <span>SGNR, Rajasthan, India</span>
                            </div>
                        </div>
                    </div>

                    <!-- Contact form -->
                    <form class="contact-form" id="contactForm" action="https://formspree.io/f/mzdlezzo" method="POST" novalidate>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="name">Your Name</label>
                                <input type="text" id="name" name="name" placeholder="Anirudh" required>
                                <span class="form-error" id="nameError"></span>
                            </div>
                            <div class="form-group">
                                <label for="email">Your Email</label>
                                <input type="email" id="email" name="email" placeholder="you@example.com" required>
                                <span class="form-error" id="emailError"></span>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="subject">Subject</label>
                            <input type="text" id="subject" name="subject" placeholder="What's this about?" required>
                            <span class="form-error" id="subjectError"></span>
                        </div>
                        <div class="form-group">
                            <label for="message">Message</label>
                            <textarea id="message" name="message" rows="6" placeholder="Write your message here…" required></textarea>
                            <span class="form-error" id="messageError"></span>
                        </div>
                        <button type="submit" class="btn btn-submit">
                            <span class="btn-text">Send Message</span>
                            <span class="btn-icon">→</span>
                        </button>
                        <p class="form-success" id="formSuccess">Message sent! I'll get back to you soon.</p>
                    </form>

                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>© 2026 Anirudh. All rights reserved. &copy;</p>
    </footer>
    <script src="assets/js/script.js"></script>
</body>

</html>
